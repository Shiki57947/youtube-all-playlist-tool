<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>YouTubeプレイリスト生成</title>

<link rel="manifest" href="manifest.json">

<style>
body{
font-family:sans-serif;
text-align:center;
padding:20px;
background:#f5f5f5;
}

.container{
max-width:500px;
margin:auto;
}

h2{
margin-bottom:20px;
}

input{
width:100%;
padding:15px;
font-size:16px;
border-radius:10px;
border:1px solid #ccc;
margin-bottom:15px;
}

button{
width:100%;
padding:15px;
font-size:18px;
border:none;
border-radius:10px;
margin-top:10px;
cursor:pointer;
}

.generate{
background:#ff0000;
color:white;
}

.open{
background:#4CAF50;
color:white;
}

.copy{
background:#333;
color:white;
}

#result{
margin-top:20px;
word-break:break-all;
font-size:14px;
}

</style>

</head>

<body>

<div class="container">

<h2>🎧 YouTubeプレイリスト生成</h2>

<input id="input" placeholder="チャンネルURL or ID">

<button class="generate" onclick="generate()">生成する</button>

<button class="open" onclick="openYoutube()">YouTubeで開く</button>

<button class="copy" onclick="copyUrl()">URLコピー</button>

<div id="result"></div>

</div>

<script>

let generatedUrl="";

function extractChannelId(text){
const match=text.match(/UC[\w-]+/)
return match ? match[0] : null
}

function generate(){

const input=document.getElementById("input").value.trim()

const channelId=extractChannelId(input)

if(!channelId){
alert("チャンネルIDが見つかりません")
return
}

const playlistId="UU"+channelId.slice(2)

generatedUrl="https://www.youtube.com/playlist?list="+playlistId

document.getElementById("result").innerText=generatedUrl

}

function openYoutube(){

if(!generatedUrl){
alert("先に生成してください")
return
}

window.location.href=generatedUrl

}

function copyUrl(){

if(!generatedUrl){
alert("先に生成してください")
return
}

navigator.clipboard.writeText(generatedUrl)

alert("コピーしました！")

}

</script>

</body>
</html>
